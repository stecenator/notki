defaults {
  user_friendly_names yes
  find_multipaths yes
  enable_foreign "^$"
}

blacklist_exceptions {
        property "(SCSI_IDENT_|ID_WWN)"
}

blacklist {
}
devices {
        device {
                vendor "IBM"
                product "^2145"
                path_selector "service-time 0" # Used by Red Hat 7.x
                prio "alua"
                path_checker "tur"
                failback "immediate"
                no_path_retry 5
                rr_weight uniform
                rr_min_io_rq "1"
                dev_loss_tmo 120  
        }
}
multipaths {
        multipath {
                wwid    "3600507681281019f3800000000000018"   # 3+serial LUNU z macierzy
                alias   "tsm-a-db01"                          # Nazwa LUNu z macierzy
        }
}