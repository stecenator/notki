---
# Generowanie pliku multipath.conf dla dysków GPFS Data z macierzy IBM FlashSystem 5200
# Playbook pobiera informacje o dyskach utworzonych przez mk_gpfs_data_vdisks.yaml
# i generuje plik mio.conf z wpisami multipath

- hosts: localhost
  gather_facts: true

  vars:
    output_file: "mpio.conf"
    disk_prefix: "cinek-gpfs-nsd"
    disk_count: 8

  tasks:
    - name: Pobieranie informacji o dyskach GPFS Data z macierzy
      ibm.storage_virtualize.ibm_svc_info:
        clustername: "{{ fs_cluster }}"
        username: "{{ fs_user }}"
        password: "{{ fs_pass }}"
        log_path: "{{ fs_log }}"
        gather_subset:
          - vol
        objectname: "{{ disk_prefix }}{{ '%02d' | format(item) }}"
        validate_certs: false
      loop: "{{ range(1, disk_count + 1) | list }}"
      loop_control:
        label: "{{ disk_prefix }}{{ '%02d' | format(item) }}"
      register: disk_info

    - name: Sprawdzenie, czy zostały pobrane dane o dyskach
      debug:
        var: disk_info

    - name: Wyświetlenie pobranych informacji o dyskach
      debug:
        msg: "Dysk: {{ item.Volume[0].name }}, UID: {{ item.Volume[0].vdisk_UID }}"
      loop: "{{ disk_info.results }}"
      loop_control:
        label: "{{ item.Volume[0].name }}"

    - name: Przygotowanie listy dysków z numerami seryjnymi
      set_fact:
        multipath_devices: "{{ multipath_devices | default([]) + [{'name': item.Volume[0].name, 'wwid': '3' + item.Volume[0].vdisk_UID | lower}] }}"
      loop: "{{ disk_info.results }}"
      loop_control:
        label: "{{ item.Volume[0].name }}"

    - name: Generowanie zawartości pliku multipath.conf
      set_fact:
        multipath_lines: "{{ ['# Multipath configuration for GPFS Data disks from IBM FlashSystem 5200', '# Generated by Ansible playbook: gen_multipath_conf.yaml', '# Date: ' + ansible_date_time.iso8601, '', 'multipaths {'] }}"

    - name: Dodanie wpisów multipath dla każdego dysku
      set_fact:
        multipath_lines: "{{ multipath_lines + ['    multipath {', '        wwid \"' + item.wwid + '\"', '        alias \"' + item.name + '\"', '    }'] }}"
      loop: "{{ multipath_devices }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Zamknięcie sekcji multipaths
      set_fact:
        multipath_lines: "{{ multipath_lines + ['}'] }}"

    - name: Połączenie linii w jeden string
      set_fact:
        multipath_content: "{{ multipath_lines | join('\n') }}"

    - name: Zapisanie pliku mpio.conf
      copy:
        content: "{{ multipath_content }}\n"
        dest: "{{ playbook_dir }}/{{ output_file }}"
        mode: '0644'
      delegate_to: localhost

    - name: Podsumowanie
      debug:
        msg:
          - "Wygenerowano plik {{ output_file }} z {{ multipath_devices | length }} wpisami multipath"
          - "Plik można skopiować do /etc/multipath.conf na serwerach GPFS"
          - "Po skopiowaniu uruchom: systemctl reload multipathd"

    - name: Wyświetlenie zawartości pliku
      debug:
        msg: "{{ multipath_content }}"

