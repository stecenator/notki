---
# Przywracanie dysków OS z snapshotów dla LPARów GPFS

- hosts: localhost
  gather_facts: false

  tasks:
    - name: Wyłączanie LPARu {{ item.key }}
      ibm.power_hmc.powervm_lpar_instance:
        hmc_host: '{{ hmc }}'
        hmc_auth:
          username: '{{ hmc_user }}'
          password: '{{ hmc_pass }}'
        system_name: "{{ item.value.system_name }}"
        vm_name: "{{ item.key }}"
        action: shutdown
        shutdown_option: Immediate
      loop: "{{ gpfs_lpars | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      register: shutdown_result
      ignore_errors: true
      tags:
       - shutdown

    - name: Oczekiwanie na wyłączenie LPARów
      pause:
        seconds: 30
        prompt: "Oczekiwanie na pełne wyłączenie LPARów..."
      tags:
       - shutdown

    - name: Weryfikacja stanu LPARu {{ item.key }}
      ibm.power_hmc.powervm_lpar_instance:
        hmc_host: '{{ hmc }}'
        hmc_auth:
          username: '{{ hmc_user }}'
          password: '{{ hmc_pass }}'
        system_name: "{{ item.value.system_name }}"
        vm_name: "{{ item.key }}"
        state: facts
      loop: "{{ gpfs_lpars | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      register: lpar_state
      tags:
       - shutdown

    # - name: Wyświetlenie stanu LPARów
    #   debug:
    #     msg: "LPAR {{ item.item.key }} - stan: {{ item.partition_info.state }}"
    #   loop: "{{ lpar_state.results }}"
    #   loop_control:
    #     label: "{{ item.item.key }}"
    #   tags:
    #    - shutdown

    - name: Przywracanie dysku OS ze snapshota dla {{ item.key }}
      ibm.storage_virtualize.ibm_sv_manage_snapshot:
        clustername: "{{ fs_cluster }}"
        username: "{{ fs_user }}"
        password: "{{ fs_pass }}"
        log_path: "{{ fs_log }}"
        name: "{{ item.key | regex_replace('^cinek-', 'cinek-os-') }}-bkp"
        state: restore
        # src_volume_names: "{{ item.key | regex_replace('^cinek-', 'cinek-os-') }}"
        validate_certs: false
      loop: "{{ gpfs_lpars | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      register: restore_result
      tags:
       - restore

    - name: Wyświetlenie wyników przywracania
      debug:
        msg: "Dysk OS dla {{ item.item.key }} został przywrócony ze snapshota {{ item.item.key | regex_replace('^cinek-', 'cinek-os-') }}-bkp"
      loop: "{{ restore_result.results }}"
      loop_control:
        label: "{{ item.item.key }}"
      when: item.changed
      tags:
       - restore

