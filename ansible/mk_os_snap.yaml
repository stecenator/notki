---
# Tworzenie snapshotów dysków OS na macierzy dla LPARów GPFS

- hosts: localhost
  gather_facts: false

  tasks:
    - name: Tworzenie snapshota dysku OS dla {{ item.key }}
      ibm.storage_virtualize.ibm_sv_manage_snapshot:
        clustername: "{{ fs_cluster }}"
        username: "{{ fs_user }}"
        password: "{{ fs_pass }}"
        log_path: "{{ fs_log }}"
        name: "{{ item.key | regex_replace('^cinek-', 'cinek-os-') }}-bkp"
        state: present
        src_volume_names: "{{ item.key | regex_replace('^cinek-', 'cinek-os-') }}"
        validate_certs: false
      loop: "{{ gpfs_lpars | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

